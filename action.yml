name: Releaser Upload
description: Create a version and upload files to a Releaser instance

inputs:
  url:
    description: Base URL of the Releaser instance (e.g. https://oein.fyi)
    required: true
  api-key:
    description: Admin API key
    required: true
  project:
    description: Project ID
    required: true
  version:
    description: Version string (e.g. v1.0.0 / v1.0.0b / nightly)
    required: true
  type:
    description: Version type — release | beta | dev
    required: false
    default: release
  description:
    description: Release notes / version description
    required: false
    default: ''
  tags:
    description: >
      Comma-separated list of tags to apply to this version.
      Tags must already exist on the project.
      Example: stable, lts
    required: false
    default: ''
  files:
    description: >
      Newline-separated list of file paths or glob patterns to upload.
      Example: |
        dist/app-linux
        dist/app-win.exe
        dist/*.zip
    required: false
    default: ''

outputs:
  version-id:
    description: ID of the created (or existing) version
    value: ${{ steps.create-version.outputs.version-id }}

runs:
  using: composite
  steps:
    - name: Create version
      id: create-version
      shell: bash
      env:
        RELEASER_URL: ${{ inputs.url }}
        RELEASER_API_KEY: ${{ inputs.api-key }}
        PROJECT_ID: ${{ inputs.project }}
        VERSION: ${{ inputs.version }}
        TYPE: ${{ inputs.type }}
        DESCRIPTION: ${{ inputs.description }}
        TAGS: ${{ inputs.tags }}
      run: |
        # Auto-prefix 'v' for release/beta if not already present
        if [[ "$TYPE" != "dev" && "$VERSION" != v* ]]; then
          VERSION="v${VERSION}"
          echo "ℹ Normalized version to ${VERSION}"
        fi
        echo "normalized-version=${VERSION}" >> "$GITHUB_OUTPUT"

        # Build tags JSON array from comma-separated input
        TAGS_JSON="[]"
        if [ -n "$TAGS" ]; then
          TAGS_JSON=$(python3 -c "import json,sys;tags=[t.strip() for t in sys.argv[1].split(',') if t.strip()];print(json.dumps(tags))" "$TAGS")
        fi

        # -s: silent, -w: write HTTP code, -o: response body to file
        # Do NOT use -f — we handle non-2xx ourselves
        BODY=$(mktemp)
        HTTP_CODE=$(curl -s -w "%{http_code}" -o "$BODY" -X POST \
          "${RELEASER_URL}/api/admin/projects/${PROJECT_ID}/versions" \
          -H "Authorization: Bearer ${RELEASER_API_KEY}" \
          -H "Content-Type: application/json" \
          -d "{\"version\":\"${VERSION}\",\"type\":\"${TYPE}\",\"description\":\"${DESCRIPTION}\",\"tags\":${TAGS_JSON}}")

        if [ "$HTTP_CODE" = "201" ]; then
          echo "✓ Version ${VERSION} created"
        elif [ "$HTTP_CODE" = "409" ]; then
          echo "ℹ Version ${VERSION} already exists, continuing"
        else
          echo "✗ Failed to create version — HTTP ${HTTP_CODE}"
          cat "$BODY"
          rm -f "$BODY"
          exit 1
        fi
        rm -f "$BODY"

        # Fetch version ID (version string may contain special chars — URL-encode it)
        ENCODED_VERSION=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "${VERSION}")
        VERSION_DATA=$(curl -s \
          "${RELEASER_URL}/api/v1/projects/${PROJECT_ID}/versions/${ENCODED_VERSION}")

        VERSION_ID=$(echo "$VERSION_DATA" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
        if [ -z "$VERSION_ID" ]; then
          echo "✗ Could not fetch version ID"
          echo "$VERSION_DATA"
          exit 1
        fi
        echo "version-id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
        echo "Version ID: ${VERSION_ID}"

    - name: Upload files
      if: inputs.files != ''
      shell: bash
      env:
        RELEASER_URL: ${{ inputs.url }}
        RELEASER_API_KEY: ${{ inputs.api-key }}
        PROJECT_ID: ${{ inputs.project }}
        VERSION: ${{ steps.create-version.outputs.normalized-version }}
        FILES: ${{ inputs.files }}
      run: |
        ENCODED_VERSION=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "${VERSION}")
        UPLOAD_URL="${RELEASER_URL}/api/admin/projects/${PROJECT_ID}/versions/${ENCODED_VERSION}/files"
        FAILED=0

        while IFS= read -r pattern; do
          [ -z "$pattern" ] && continue
          for file in $pattern; do
            [ -f "$file" ] || continue
            BODY=$(mktemp)
            HTTP_CODE=$(curl -s -w "%{http_code}" -o "$BODY" \
              -X POST "$UPLOAD_URL" \
              -H "Authorization: Bearer ${RELEASER_API_KEY}" \
              -F "file=@${file}")
            if [ "$HTTP_CODE" = "201" ]; then
              echo "✓ $(basename "$file")"
            else
              echo "✗ $(basename "$file") — HTTP ${HTTP_CODE}: $(cat "$BODY")"
              FAILED=1
            fi
            rm -f "$BODY"
          done
        done <<< "$FILES"

        [ "$FAILED" = "0" ] || exit 1
